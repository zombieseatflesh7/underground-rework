[mod-setting-name]
cheaper-recipes=Alternate UB recipes
double-stack-size=Double UB stack size
minimum-length=Minimum UB max length

[mod-setting-description]
cheaper-recipes=Aims to make a pair of underground belts cost as much as 3-4 equivalent transport belts. Automatically attempts to modify recipes from other mods. May have mixed results.
double-stack-size=Doubled stack size for underground belts only.
minimum-length=Sets the max length of each undergound belt to be AT LEAST THIS VALUE. Express is 8. Turbo is 10.